name: Pull Upstream

on:
  schedule:
    - cron: '0 6 1 * *'

jobs:
  pull-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: upstream

      - name: Set up Git
        run: |
          git config user.email "<>"
          git config user.name "Actions Upstream Bot"

      - name: Add remote branch
        run: |
          git remote add upstreamOrigin https://git.suckless.org/dmenu
          git fetch upstreamOrigin

      - name: Pull down changes
        run: |
          git reset --hard upstreamOrigin/master
          git clean -fdx
          git push --force-with-lease origin upstream
